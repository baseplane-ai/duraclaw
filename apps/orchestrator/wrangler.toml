name = "duraclaw-orchestrator"
main = "src/server.ts"
compatibility_date = "2026-03-31"
# `web_socket_auto_reply_to_close` ships as default on compat date
# 2026-04-07. We're pinned to 2026-03-31; without this flag the runtime
# leaves a WS in CLOSING after receiving a Close frame and never replies,
# so the peer observes abnormal code=1006 drops. Observed as ~70s Gateway
# WS flap in prod wrangler tail (hundreds of closes/hour with zero
# clean closes). Opt in explicitly rather than bumping the compat date.
compatibility_flags = ["nodejs_compat", "web_socket_auto_reply_to_close"]

workers_dev = true

[[routes]]
pattern = "dura.baseplane.ai"
custom_domain = true

[observability]
enabled = true

# Cron triggers — replaces the in-DO discovery alarm (issue #7 p2).
# Calls the `scheduled` handler in src/server.ts every 5 minutes.
[triggers]
crons = ['*/5 * * * *']

[assets]
binding = "ASSETS"
directory = "./dist/client"

# Durable Object bindings — session-per-DO model
[[durable_objects.bindings]]
name = "SESSION_AGENT"
class_name = "SessionDO"

[[durable_objects.bindings]]
name = "USER_SETTINGS"
class_name = "UserSettingsDO"

[[durable_objects.bindings]]
name = "SESSION_COLLAB"
class_name = "SessionCollabDOv2"

# Keep old binding alive to avoid implicit delete-class (CF error 10061).
# SessionCollabDO is orphaned — no code references this binding.
[[durable_objects.bindings]]
name = "SESSION_COLLAB_LEGACY"
class_name = "SessionCollabDO"

# Per-file collaborative document DO (GH#27). One DO per (projectId, relPath)
# pair, addressed via env.REPO_DOCUMENT.idFromName(entityId) where
# entityId = sha256(projectId + ':' + relPath).slice(0,16).
[[durable_objects.bindings]]
name = "REPO_DOCUMENT"
class_name = "RepoDocumentDO"

# Per-arc collaborative DO (GH#152 P1.3 B11). One DO per arc id; backs
# per-arc team chat (`chat_messages` SQLite table) and the future Yjs
# awareness layer (P1.6). WS upgrades + Hono forwarders land in WU-C.
[[durable_objects.bindings]]
name = "ARC_COLLAB_DO"
class_name = "ArcCollabDO"

# DO migrations — collapsed for fresh deploy on baseplane-ai account.
# The old worker (on the codevibesmatter account) held the prior v1..v5 chain;
# here we start at the final SQLite-backed shape.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO", "ProjectRegistry"]
# Note: ProjectRegistry was created here at v1 to keep the migration chain
# compatible with the originally-deployed shape; it is dropped at v4 below.

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserSettingsDO"]

# v3 created SessionCollabDO. DO NOT edit this tag — Cloudflare tracks
# migrations by tag name and silently skips ones it has already applied,
# so rewriting v3's body is a no-op against deployed workers. New classes
# must be introduced by a NEW tag (see v6 below).
[[migrations]]
tag = "v3"
new_sqlite_classes = ["SessionCollabDO"]

# Issue #7 p3: UserSettingsDO is now a stateless PartyServer fanout.
# The class no longer touches its SQLite — storage from the v2
# Agent-based implementation is orphaned and harmlessly reaped.
[[migrations]]
tag = "v4"

# Issue #7 p6 (B-INFRA-5): drop the ProjectRegistry DO class entirely.
# All session metadata now lives in D1 (agent_sessions). The class binding
# was removed from this file in the same change, so deleted_classes here
# tells Cloudflare to release the namespace storage as well.
[[migrations]]
tag = "v5"
deleted_classes = ["ProjectRegistry"]

# v6: introduce SessionCollabDOv2 as a fresh sqlite-backed class.
# Why a new class: the original SessionCollabDO was deployed non-sqlite,
# so `new_sqlite_classes` in v3 couldn't upgrade it (CF error 10074,
# "can't add sqlite to existing non-sqlite DO class"). The
# SESSION_COLLAB binding now points at v2; the legacy SessionCollabDO
# class is kept alive via the SESSION_COLLAB_LEGACY binding + stub in
# src/agents/session-collab-do-legacy.ts to avoid implicit delete-class
# (CF error 10061).
[[migrations]]
tag = "v6"
new_sqlite_classes = ["SessionCollabDOv2"]

# v7: introduce RepoDocumentDO for per-file collab Yjs (GH#27 P1.2 B1).
# Backs the /api/collab/repo-document/:entityId/ws route. One DO per
# (projectId, relPath) entityId. SQLite-backed for y_state persistence
# (clone of SessionCollabDOv2 shape) plus tombstone state via alarm API.
[[migrations]]
tag = "v7"
new_sqlite_classes = ["RepoDocumentDO"]

# v8: introduce ArcCollabDO for per-arc team chat (GH#152 P1.3 B11) +
# the future Yjs awareness layer (P1.6). Hybrid DO: extends YServer
# for the y-partyserver wire AND owns custom SQLite tables (chat_messages
# at v8; reactions at a later DO migration). See
# planning/specs/152-team-collab-chat-comments.md.
[[migrations]]
tag = "v8"
new_sqlite_classes = ["ArcCollabDO"]

# D1 database for auth — `c5b4d822` on Ben@baseplane.ai (account
# `87bd3030`), where the infra pipeline deploys. Do NOT let wrangler
# rewrite `database_id` on remote-migration apply; always pass
# `CLOUDFLARE_ACCOUNT_ID=87bd3030c315cfdc6e9f9c04ad6f37bc` explicitly.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "duraclaw-auth"
database_id = "c5b4d822-9bc6-467f-9ad6-7ee779b82e0c"

# R2 bucket for mobile OTA + APK artifacts. Keys:
#   ota/version.json        — `{ version, key }` pointing at the current zip
#   ota/bundle-<sha>.zip    — the Capgo-consumable web bundle payload
#   apk/version.json        — `{ version, key }` pointing at the current APK
#   apk/duraclaw-<ver>.apk  — the signed APK for native-layer updates
# Worker reads these via `env.MOBILE_ASSETS.get()` in /api/mobile/* routes
# and streams zip/APK bytes through `GET /api/mobile/assets/*`, so the URL
# returned to the Capacitor shell is a same-origin Worker URL — no R2
# public-domain or pre-signed URLs required. Upload lives in
# scripts/build-mobile-ota-bundle.sh (invoked by the infra pipeline after
# the orchestrator build).
[[r2_buckets]]
binding = "MOBILE_ASSETS"
bucket_name = "duraclaw-mobile"

# R2 bucket for session media (GH#65). Oversized base64 image data from
# user messages is offloaded here before SQLite persistence — the DO stores
# only a lightweight `r2Key` reference in the message part, and the Worker
# streams the image back through `GET /api/sessions/media/*`.
[[r2_buckets]]
binding = "SESSION_MEDIA"
bucket_name = "duraclaw-session-media"

[vars]
VAPID_SUBJECT = "mailto:push@codevibesmatter.com"

# Environment variables (set via wrangler secret)
# CC_GATEWAY_URL      — VPS executor WebSocket URL
# CC_GATEWAY_SECRET   — Bearer token for VPS auth
# BETTER_AUTH_SECRET   — Secret for Better Auth session signing
# BETTER_AUTH_URL      — Base URL for auth (e.g. https://your-domain.com)
# VAPID_PUBLIC_KEY     — Web Push VAPID public key (base64url)
# VAPID_PRIVATE_KEY    — Web Push VAPID private key (base64url)
# WORKER_PUBLIC_URL    — Public URL of this worker (e.g. https://duraclaw.workers.dev)
# FCM_SERVICE_ACCOUNT_JSON — Firebase service account JSON (single-line, GH#26 P1 B5).
#                            Enables FCM push to Capacitor Android shell. Opt-in:
#                            unset = no FCM dispatch, web push (VAPID) unaffected.
# SYNC_BROADCAST_SECRET — Bearer token guarding UserSettingsDO `POST /broadcast`
#                          (GH#32 phase p2a). API handlers that want to push
#                          delta frames to a user's browsers authenticate with
#                          this secret. Set via `wrangler secret put`.
